<!doctype html>
<html>
<head><style>
body { background: #f0f0f0; display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; min-height: 100vh; margin: 0; font-family: sans-serif; }
.box { display: flex; flex-direction: column; align-items: center; gap: 12px; }
img { display: block; }
span { font-size: 12px; color: #666; }
</style></head>
<body>
  <div class="box"><img src="logo.svg" width="200" height="200"><span>SVG 200px</span></div>
  <div class="box"><img src="logo.svg" width="64" height="64"><span>64px</span></div>
  <div class="box"><img src="logo.svg" width="32" height="32"><span>32px</span></div>
  <div class="box"><img src="logo.svg" width="22" height="22"><span>22px (toolbar)</span></div>
  <div class="box"><img src="logo.png" width="200" height="200"><span>Original PNG</span></div>
</body>
</html>
