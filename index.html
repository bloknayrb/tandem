<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="theme-color" content="#fafaf9" />
    <title>Tandem - Collaborative Editor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { height: 100%; overflow: hidden; }
      body {
        font-family: var(--tandem-font-sans, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
        background: var(--tandem-bg, #fff);
        color: var(--tandem-fg, #111827);
        font-feature-settings: "cv11", "ss01", "ss03";
        -webkit-font-smoothing: antialiased;
      }

      /* Tandem theme tokens.
         Light is the default; dark overrides via [data-theme="dark"] on <html>.
         Pairs meet WCAG AA (4.5:1 for small text, 3:1 for large/non-text). */
      @font-face {
        font-family: "Inter Tight";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url("/fonts/inter-tight-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Source Serif 4";
        font-style: normal;
        font-weight: 400 600;
        font-display: swap;
        src: url("/fonts/source-serif-4-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Hanuman";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url("/fonts/hanuman-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-weight: 400 500;
        font-display: swap;
        src: url("/fonts/jetbrains-mono-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "Sono";
        font-style: normal;
        font-weight: 200 800;
        font-display: swap;
        src: url("/fonts/sono-latin.woff2") format("woff2");
      }
      @font-face {
        font-family: "SN Pro";
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url("/fonts/sn-pro-latin.woff2") format("woff2");
      }
      :root {
        --tandem-font-sans: "SN Pro", "Inter Tight", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --tandem-font-serif: "Hanuman", "Source Serif 4", "Source Serif Pro", Charter, "Iowan Old Style", Georgia, serif;
        --tandem-font-mono: "Sono", "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
        --tandem-bg: oklch(0.985 0.004 80);
        --tandem-fg: oklch(0.22 0.012 280);
        --tandem-surface: oklch(1 0 0);
        --tandem-surface-muted: oklch(0.975 0.005 80);
        --tandem-surface-sunk: oklch(0.96 0.006 80);
        --tandem-border: oklch(0.92 0.005 280);
        --tandem-border-strong: oklch(0.86 0.006 280);
        --tandem-fg-muted: oklch(0.48 0.008 280);
        /* Backed off from 0.44 → 0.54 to preserve visual hierarchy while meeting WCAG AA 4.5:1 */
        --tandem-fg-subtle: oklch(0.54 0.008 280);
        --tandem-fg-faint: oklch(0.64 0.005 280);
        --tandem-accent-h: 275deg;
        --tandem-accent: oklch(0.52 0.16 var(--tandem-accent-h));
        --tandem-accent-fg: oklch(0.99 0.005 var(--tandem-accent-h));
        --tandem-accent-bg: oklch(0.95 0.03 var(--tandem-accent-h));
        --tandem-accent-fg-strong: oklch(0.42 0.18 var(--tandem-accent-h));
        --tandem-author-user: oklch(0.55 0.14 245);
        --tandem-author-claude: #d97757;
        --tandem-author-claude-fg: oklch(0.24 0.03 55);
        --tandem-claude-focus-bg: color-mix(in srgb, var(--tandem-author-claude) 10%, transparent);
        --tandem-claude-focus-border: color-mix(in srgb, var(--tandem-author-claude) 40%, transparent);
        --tandem-success: oklch(0.55 0.14 150);
        --tandem-success-fg: #ffffff;
        --tandem-success-fg-strong: #166534;
        --tandem-success-bg: color-mix(in srgb, var(--tandem-success) 10%, var(--tandem-surface));
        --tandem-success-border: color-mix(in srgb, var(--tandem-success) 40%, var(--tandem-border));
        --tandem-warning: oklch(0.62 0.16 65);
        --tandem-warning-fg: #ffffff;
        --tandem-warning-fg-strong: #92400e;
        --tandem-warning-bg: color-mix(in srgb, var(--tandem-warning) 10%, var(--tandem-surface));
        --tandem-warning-border: color-mix(in srgb, var(--tandem-warning) 40%, var(--tandem-border));
        --tandem-error: oklch(0.55 0.18 25);
        --tandem-error-fg: #ffffff;
        --tandem-error-fg-strong: #991b1b;
        --tandem-error-bg: color-mix(in srgb, var(--tandem-error) 10%, var(--tandem-surface));
        --tandem-error-border: color-mix(in srgb, var(--tandem-error) 40%, var(--tandem-border));
        --tandem-info: oklch(0.58 0.2 258);
        --tandem-info-fg: #ffffff;
        --tandem-info-fg-strong: oklch(0.38 0.16 258);
        --tandem-info-bg: color-mix(in srgb, var(--tandem-info) 10%, var(--tandem-surface));
        --tandem-info-border: color-mix(in srgb, var(--tandem-info) 40%, var(--tandem-border));
        --tandem-suggestion: oklch(0.52 0.18 305);
        --tandem-suggestion-fg-strong: #5b21b6;
        --tandem-suggestion-bg: color-mix(in srgb, var(--tandem-suggestion) 10%, var(--tandem-surface));
        --tandem-suggestion-border: color-mix(in srgb, var(--tandem-suggestion) 40%, var(--tandem-border));
        --tandem-accent-border: oklch(0.84 0.10 var(--tandem-accent-h));
        --tandem-selection-blurred-bg: color-mix(in srgb, var(--tandem-accent) 22%, transparent);
        --tandem-editor-font-family: var(--tandem-font-sans);
        --tandem-editor-font-size: 17px;
        --tandem-scrollbar-track: oklch(0.96 0.006 80);
        --tandem-scrollbar-thumb: oklch(0.82 0.005 280);
        --tandem-highlight-yellow: rgba(255, 235, 59, 0.3);
        --tandem-highlight-green: rgba(76, 175, 80, 0.3);
        --tandem-highlight-blue: rgba(33, 150, 243, 0.3);
        --tandem-highlight-pink: rgba(236, 72, 153, 0.3);
        /* Theme-picker swatch chips. Fixed identity colors that PREVIEW
           each scheme — they do NOT track the active theme (adapting
           them would defeat the picker visually). Note:
           --tandem-swatch-dark is oklch(0.22 0.012 280), NOT the dark
           theme's actual --tandem-bg (oklch(0.18 0.012 270)) —
           intentional design choice; do not "correct" to match. */
        --tandem-swatch-light: oklch(1 0 0);
        --tandem-swatch-dark: oklch(0.22 0.012 280);
        --tandem-swatch-warm: oklch(0.945 0.012 70);
        --tandem-h-fmtbar: 36px;
        --tandem-page-bg: #e8e8e8;
        --tandem-page-paper: #ffffff;
        --tandem-page-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        /* density spacing scale — cozy defaults */
        --tandem-space-1: 4px;
        --tandem-space-2: 8px;
        --tandem-space-3: 12px;
        --tandem-space-4: 16px;
        --tandem-space-5: 24px;
        --tandem-space-6: 32px;
        --tandem-space-7: 48px;
        --tandem-r-1: 2px;
        --tandem-r-2: 4px;
        --tandem-r-3: 6px;
        --tandem-r-4: 8px;
        --tandem-r-5: 12px;
        --tandem-r-pill: 9999px;
        --tandem-r-circle: 50%;
        --tandem-text-2xs: 10px;
        --tandem-text-xs: 11px;
        --tandem-text-sm: 12px;
        --tandem-text-base: 13px;
        --tandem-text-md: 14px;
        --tandem-text-lg: 17px;
        --tandem-text-xl: 20px;
        --tandem-text-2xl: 28px;
        --tandem-text-3xl: 48px;
        /* Phase 1.3 ADOPT — semantic type role tokens. Theme-invariant; no
           dark/warm overrides needed. Per token-audit.md §"Semantic type
           roles": h1/h2 adopt serif; body STAYS sans (PROD WINS override of
           bundle's serif body — protected by token-audit.md line 84). */
        --tandem-h1-font: var(--tandem-font-serif);
        --tandem-h1-size: calc(var(--tandem-text-lg) * 2);
        --tandem-h1-weight: 600;
        --tandem-h1-leading: 1.15;
        --tandem-h1-tracking: -0.02em;
        --tandem-h2-font: var(--tandem-font-serif);
        --tandem-h2-size: calc(var(--tandem-text-lg) * 1.4);
        --tandem-h2-weight: 600;
        --tandem-h2-leading: 1.2;
        --tandem-h2-tracking: -0.015em;
        --tandem-body-font: var(--tandem-font-sans);
        --tandem-body-size: var(--tandem-editor-font-size, 17px);
        --tandem-body-leading: 1.65;
        --tandem-ui-font: var(--tandem-font-sans);
        --tandem-ui-size: 13px;
        --tandem-ui-leading: 1.4;
        --tandem-shadow-1: 0 1px 2px rgba(0, 0, 0, 0.08);
        --tandem-shadow-2: 0 8px 24px rgba(0, 0, 0, 0.12);
        --tandem-shadow-3: 0 20px 60px rgba(0, 0, 0, 0.2);
        --tandem-shadow-4: 0 16px 48px rgba(0, 0, 0, 0.18);
        /* Directional rail shadows — cast inward toward the editor only. The
           rails sit flush to the window edge; an isotropic shadow would be
           clipped on the outer side. Light theme. Dark-theme override below. */
        --tandem-rail-shadow-left: 4px 0 16px -8px rgba(0, 0, 0, 0.18),
          1px 0 1px rgba(0, 0, 0, 0.03);
        --tandem-rail-shadow-right: -4px 0 16px -8px rgba(0, 0, 0, 0.18),
          -1px 0 1px rgba(0, 0, 0, 0.03);
        --tandem-z-base: 1;
        --tandem-z-dropdown: 10;
        --tandem-z-sticky: 100;
        --tandem-z-overlay: 900;
        --tandem-z-modal: 1000;
        --tandem-z-toast: 1100;
        --tandem-z-tooltip: 10000;
        /* v7 floating chrome clearance/position vars — consumed by W2-W6
           rails, fmtbar, status pill. W4a maximalist lifted DocumentTabs
           into the floating TitleBar (44px tall, no in-flow tabs row), so
           these drop to 52px per the calm-v7.css target. The fmtbar pill is
           fixed-positioned at top: 52px, height 36px → bottom at viewport
           y=88. Editor-scroll lives below the titlebar in the flex column,
           so its top edge is at viewport y=44; an editor padding-top of at
           least 52px (max(--tandem-space-7, 52px)) lands content at y≥96,
           clearing the fmtbar with ≥8px breathing. Rails use
           rail-top-clearance as margin-top inside the editor row → rail top
           also at y=96, in line with the editor content. */
        --tandem-fmtbar-top: 52px;
        --tandem-rail-top-clearance: 52px;
        --tandem-status-clearance: 36px;
        /* Bottom inset that any "hugs-content" rail (outline) reserves
           below itself so the floating status pill (W5) renders into
           clear space. Sum of pill chrome (status-clearance) + a comfy
           24px margin. Consumed by PanelSlot's outline branch in W6. */
        --tandem-status-clearance-total: calc(var(--tandem-status-clearance) + var(--tandem-space-5, 24px));
        /* Light-mode floating-pill stack (matches v7 calm-v7.css). Warm/dark
           override --c7-pill-shadow inside their own theme blocks. */
        --c7-pill-shadow:
          0 1px 1px rgba(0, 0, 0, 0.04),
          0 6px 14px -6px rgba(0, 0, 0, 0.10),
          0 22px 38px -22px rgba(0, 0, 0, 0.16);
      }

      /* Shared white-mode floating-pill recipe. Applied to every floating
         chrome surface introduced by Waves 3-6: fmtbar, titlebar clusters,
         tab pills, +/add pill, mode segment, status pill, mini-toolbar,
         wincontrols. Surfaces only need .tandem-floating-pill + a sensible
         border-radius (pill or 14px). Surface-specific overrides (padding,
         max-width, drag-region) layer on top. */
      .tandem-floating-pill {
        background: var(--tandem-surface);
        border: 1px solid var(--tandem-border);
        border-radius: var(--tandem-r-pill);
        box-shadow: var(--c7-pill-shadow);
        backdrop-filter: saturate(140%) blur(8px);
        -webkit-backdrop-filter: saturate(140%) blur(8px);
      }
      [data-theme="dark"] .tandem-floating-pill {
        --c7-pill-shadow:
          0 1px 1px rgba(0, 0, 0, 0.30),
          0 6px 14px -6px rgba(0, 0, 0, 0.40),
          0 22px 38px -22px rgba(0, 0, 0, 0.50);
      }

      /* `filter: opacity()` is used instead of plain `opacity:` so the fade
         composes with cards that already carry an inline opacity (e.g.
         accepted cards at 0.6) rather than being clamped by it. Highlights
         are intentionally excluded — they're user-owned color flags. */
      [data-tandem-mode="solo"] [data-annotation-type="comment"],
      [data-tandem-mode="solo"] [data-annotation-type="note"],
      [data-tandem-mode="solo"] [data-testid="margin-column-left"] .margin-bubble,
      [data-tandem-mode="solo"] [data-testid="margin-column-right"] .margin-bubble {
        filter: opacity(0.45);
        transition: filter 200ms ease;
      }

      /* Fade the in-editor underline decorations to match the side-panel card
         fade above — keeps the visual weight of comments/notes consistent
         between the editor and the panel in solo mode. */
      [data-tandem-mode="solo"] .tandem-comment,
      [data-tandem-mode="solo"] .tandem-note {
        opacity: 0.45;
        transition: opacity 200ms ease;
      }

      /* Slash command menu — v7 floating-card variant.
         Inherits floating-pill bg/border/shadow then overrides border-radius
         to a card shape (menus aren't pill-shaped) and stacks an item list
         with a keyboard-hint footer. */
      .tandem-slash-menu {
        border-radius: var(--tandem-r-4);
        min-width: 200px;
        padding: var(--tandem-space-1);
        z-index: var(--tandem-z-popover, 1100);
      }
      .tandem-slash-menu__item {
        display: flex;
        align-items: center;
        width: 100%;
        padding: var(--tandem-space-1) var(--tandem-space-3);
        border: 1px solid transparent;
        border-radius: var(--tandem-r-2);
        background: transparent;
        color: var(--tandem-fg);
        font: inherit;
        font-size: var(--tandem-text-sm);
        text-align: left;
        cursor: pointer;
        white-space: nowrap;
      }
      .tandem-slash-menu__item:hover {
        background: color-mix(in srgb, var(--tandem-fg) 5%, transparent);
      }
      .tandem-slash-menu__item[aria-selected="true"] {
        background: var(--tandem-accent-bg);
        color: var(--tandem-accent-fg-strong);
        border-color: var(--tandem-accent-border);
      }
      .tandem-slash-menu__hint {
        display: flex;
        gap: var(--tandem-space-3);
        padding: var(--tandem-space-1) var(--tandem-space-3);
        margin-top: var(--tandem-space-1);
        border-top: 1px solid var(--tandem-border);
        font-size: var(--tandem-text-2xs);
        color: var(--tandem-fg-faint);
      }
      .tandem-slash-menu__hint kbd {
        font-family: var(--tandem-font-mono);
        font-size: var(--tandem-text-2xs);
        padding: 0 4px;
        border: 1px solid var(--tandem-border);
        border-radius: var(--tandem-r-1);
        background: var(--tandem-surface-muted);
        color: var(--tandem-fg-subtle);
      }

      [data-theme="dark"] {
        /* Tracks the calm-v7 dark canon at hue 280°. */
        --tandem-bg: oklch(0.22 0.012 280);
        --tandem-fg: oklch(0.94 0.006 280);
        --tandem-surface: oklch(0.27 0.012 280);
        --tandem-surface-muted: oklch(0.25 0.012 280);
        --tandem-surface-sunk: oklch(0.20 0.012 280);
        --tandem-border: oklch(0.34 0.010 280);
        --tandem-border-strong: oklch(0.42 0.012 280);
        --tandem-fg-muted: oklch(0.74 0.008 280);
        /* 0.70 keeps WCAG AA 4.5:1 against --tandem-surface-muted (0.25). */
        --tandem-fg-subtle: oklch(0.70 0.008 280);
        --tandem-fg-faint: oklch(0.58 0.008 280);
        --tandem-accent-h: 275deg;
        --tandem-accent: oklch(0.72 0.14 var(--tandem-accent-h));
        --tandem-accent-fg: oklch(0.15 0.01 var(--tandem-accent-h));
        --tandem-accent-bg: oklch(0.30 0.05 var(--tandem-accent-h));
        --tandem-accent-fg-strong: oklch(0.85 0.14 var(--tandem-accent-h));
        --tandem-author-user: oklch(0.72 0.13 245);
        --tandem-author-claude: #e89a78;
        --tandem-author-claude-fg: oklch(0.24 0.03 55);
        --tandem-claude-focus-bg: color-mix(in srgb, var(--tandem-author-claude) 10%, transparent);
        --tandem-claude-focus-border: color-mix(in srgb, var(--tandem-author-claude) 40%, transparent);
        --tandem-success: #22c55e;
        --tandem-success-fg: #0f172a;
        --tandem-success-fg-strong: #bbf7d0;
        --tandem-success-bg: #052e16;
        --tandem-success-border: #14532d;
        --tandem-warning: #fbbf24;
        --tandem-warning-fg: #0f172a;
        --tandem-warning-fg-strong: #fde68a;
        --tandem-warning-bg: #451a03;
        --tandem-warning-border: #78350f;
        --tandem-error: #ef4444;
        --tandem-error-fg: #0f172a;
        --tandem-error-fg-strong: #fca5a5;
        --tandem-error-bg: #450a0a;
        --tandem-error-border: #7f1d1d;
        --tandem-info: #3b82f6;
        --tandem-info-fg: #0f172a;
        --tandem-info-fg-strong: #bfdbfe;
        --tandem-info-bg: #0c4a6e;
        --tandem-info-border: #0369a1;
        --tandem-suggestion: #a78bfa;
        --tandem-suggestion-fg-strong: #ddd6fe;
        --tandem-suggestion-bg: #2e1065;
        --tandem-suggestion-border: #4c1d95;
        --tandem-accent-border: oklch(0.45 0.14 var(--tandem-accent-h));
        --tandem-selection-blurred-bg: color-mix(in srgb, var(--tandem-accent) 32%, transparent);
        --tandem-scrollbar-track: oklch(0.16 0.012 270);
        --tandem-scrollbar-thumb: oklch(0.38 0.014 270);
        --tandem-highlight-yellow: rgba(255, 220, 0, 0.38);
        --tandem-highlight-green: rgba(72, 200, 80, 0.38);
        --tandem-highlight-blue: rgba(56, 168, 255, 0.38);
        --tandem-highlight-pink: rgba(240, 80, 160, 0.38);
        --tandem-page-bg: #2a2a2a;
        --tandem-page-paper: #1a1a1a;
        --tandem-page-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        --tandem-rail-shadow-left: 4px 0 18px -6px rgba(0, 0, 0, 0.55),
          1px 0 1px rgba(0, 0, 0, 0.25);
        --tandem-rail-shadow-right: -4px 0 18px -6px rgba(0, 0, 0, 0.55),
          -1px 0 1px rgba(0, 0, 0, 0.25);
      }

      /* Warm canvas theme — v7 floating chrome. OKLCH values come straight
         from calm-v7.css. Foundational tokens only: surface family + border
         + scrollbars + page metaphor + the shared pill-shadow used by every
         floating-pill surface (titlebar clusters, fmtbar, tabs, status,
         rails, wincontrols). Component-level adoption happens in W3-W6. */
      [data-theme="warm"] {
        --tandem-bg: oklch(0.945 0.012 70);
        --tandem-fg: oklch(0.22 0.012 280);
        --tandem-surface: oklch(0.975 0.005 75);
        --tandem-surface-muted: oklch(0.960 0.010 75);
        --tandem-surface-sunk: oklch(0.920 0.014 65);
        --tandem-border: oklch(0.91 0.006 75);
        --tandem-border-strong: oklch(0.84 0.008 75);
        --tandem-fg-muted: oklch(0.48 0.008 280);
        --tandem-fg-subtle: oklch(0.54 0.008 280);
        --tandem-fg-faint: oklch(0.64 0.005 280);
        --tandem-scrollbar-track: oklch(0.94 0.012 70);
        --tandem-scrollbar-thumb: oklch(0.78 0.010 75);
        --tandem-page-bg: oklch(0.925 0.012 70);
        --tandem-page-paper: oklch(0.985 0.005 75);
        --tandem-page-shadow: 0 2px 8px oklch(0 0 0 / 0.12);
        /* Floating-pill shadow stack — consumed by the shared
           .tandem-floating-pill class introduced in W3. Three light/dark
           variants of the same shape are exposed so each surface can pick
           the right contrast against its canvas. */
        --c7-pill-shadow:
          0 1px 1px oklch(0 0 0 / 0.03),
          0 4px 10px -4px oklch(0 0 0 / 0.10),
          0 16px 30px -18px oklch(0 0 0 / 0.18);
        --c7-pill-shadow-white:
          0 1px 1px oklch(0 0 0 / 0.04),
          0 6px 14px -6px oklch(0 0 0 / 0.10),
          0 22px 38px -22px oklch(0 0 0 / 0.16);
      }

      /* density spacing scale — cozy is the default (matches :root values) */
      [data-density="compact"] {
        --tandem-space-1: 2px;
        --tandem-space-2: 6px;
        --tandem-space-3: 10px;
        --tandem-space-4: 12px;
        --tandem-space-5: 16px;
        --tandem-space-6: 24px;
        --tandem-space-7: 36px;
      }

      [data-density="spacious"] {
        --tandem-space-1: 6px;
        --tandem-space-2: 12px;
        --tandem-space-3: 16px;
        --tandem-space-4: 24px;
        --tandem-space-5: 32px;
        --tandem-space-6: 48px;
        --tandem-space-7: 64px;
      }

      /* high-contrast overlay — overrides border/fg tokens for WCAG AAA readability.
         Source order puts this before forced-colors so the OS wins over our toggle. */
      [data-high-contrast="true"] {
        --tandem-border: var(--tandem-fg);
        --tandem-border-strong: var(--tandem-fg);
        --tandem-fg-muted: var(--tandem-fg);
      }

      /* [data-annotation-patterns="true"] — pattern-fill hooks for annotation decorations.
         CSS consumers land in follow-up issues (#518 authorship gutter etc.) */

      /* Windows High Contrast — let the OS drive everything. */
      @media (forced-colors: active) {
        :root, [data-theme="dark"] {
          --tandem-bg: Canvas;
          --tandem-fg: CanvasText;
          --tandem-surface: Canvas;
          --tandem-surface-muted: Canvas;
          --tandem-border: CanvasText;
          --tandem-border-strong: CanvasText;
          --tandem-fg-muted: CanvasText;
          --tandem-fg-subtle: GrayText;
          --tandem-accent: Highlight;
          --tandem-accent-fg: HighlightText;
          --tandem-accent-bg: Canvas;
          --tandem-accent-fg-strong: HighlightText;
          --tandem-author-user: CanvasText;
          --tandem-author-claude: CanvasText;
          --tandem-claude-focus-bg: Canvas;
          --tandem-claude-focus-border: Highlight;
          --tandem-scrollbar-track: Canvas;
          --tandem-scrollbar-thumb: ButtonText;
        }

        /* BulkActions confirm button: background-only in normal mode. */
        [data-testid="bulk-confirm-btn"] {
          border: 1px solid ButtonText;
        }

        /* AnnotationCard private pill: background-only warning fill. */
        [data-testid="annotation-private-pill"] {
          border: 1px solid ButtonText;
        }
      }

      /* Themed scrollbars — WebKit (Chrome/Safari/Tauri) */
      *::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      *::-webkit-scrollbar-track {
        background: var(--tandem-scrollbar-track);
      }
      *::-webkit-scrollbar-thumb {
        background: var(--tandem-scrollbar-thumb);
        border-radius: var(--tandem-r-2);
      }
      *::-webkit-scrollbar-thumb:hover {
        background: color-mix(in srgb, var(--tandem-scrollbar-thumb) 80%, var(--tandem-fg));
      }
      *::-webkit-scrollbar-corner {
        background: var(--tandem-scrollbar-track);
      }

      /* Themed scrollbars — Firefox */
      * {
        scrollbar-width: thin;
        scrollbar-color: var(--tandem-scrollbar-thumb) var(--tandem-scrollbar-track);
      }

      /* Phase 1.3 ADOPT — semantic type utility classes. Reach for these
         from chrome surfaces (rail labels, UI captions) instead of inlining
         font-family/size/leading. Editor heading rules live in editor.css. */
      .tandem-h1 {
        font-family: var(--tandem-h1-font);
        font-size: var(--tandem-h1-size);
        font-weight: var(--tandem-h1-weight);
        line-height: var(--tandem-h1-leading);
        letter-spacing: var(--tandem-h1-tracking);
      }
      .tandem-h2 {
        font-family: var(--tandem-h2-font);
        font-size: var(--tandem-h2-size);
        font-weight: var(--tandem-h2-weight);
        line-height: var(--tandem-h2-leading);
        letter-spacing: var(--tandem-h2-tracking);
      }
      .tandem-body {
        font-family: var(--tandem-body-font);
        font-size: var(--tandem-body-size);
        line-height: var(--tandem-body-leading);
      }
      .tandem-ui {
        font-family: var(--tandem-ui-font);
        font-size: var(--tandem-ui-size);
        line-height: var(--tandem-ui-leading);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Pre-seeds theme before Svelte mounts to avoid a light-flash on first paint in the
         browser distribution path. Mirrors what the Tauri shell does via WebviewWindow::theme().
         Reads persisted preference first; falls back to matchMedia.
         Note: matchMedia on Windows reflects taskbar color mode (not app mode) — full fix
         tracked with #477 browser deprecation. -->
    <script>
      (function () {
        try {
          // Key must match TANDEM_SETTINGS_KEY in src/shared/constants.ts
          var stored = localStorage.getItem("tandem:settings");
          var theme = stored && JSON.parse(stored).theme;
          if (theme !== "light" && theme !== "dark") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.dataset.theme = theme;
          window.__TANDEM_INITIAL_THEME__ = theme;
          // Sync theme-color meta tag so the browser chrome (mobile address bar,
          // PWA title bar) matches the app surface color from the first paint.
          var metaTheme = document.querySelector('meta[name="theme-color"]');
          if (metaTheme) {
            metaTheme.setAttribute("content", theme === "dark" ? "#1c1c24" : "#fafaf9");
          }
        } catch (e) { /* incognito / storage disabled — no-op, Svelte resolves on mount */ }
      })();
    </script>
    <script type="module" src="/src/client/main.ts"></script>
  </body>
</html>
