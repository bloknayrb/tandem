name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (client)
        run: npx tsc --noEmit -p tsconfig.client.json

      - name: Typecheck (server)
        run: npx tsc --noEmit -p tsconfig.server.json

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build
