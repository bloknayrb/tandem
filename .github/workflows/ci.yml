name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  rust-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Create stubs for tauri_build resource checks
        shell: bash
        run: |
          mkdir -p src-tauri/binaries dist/channel dist/server dist/client
          TRIPLE="$(rustc -Vv | grep '^host' | cut -d' ' -f2)"
          touch "src-tauri/binaries/node-sidecar-${TRIPLE}"
          touch "src-tauri/binaries/node-sidecar-${TRIPLE}.exe"

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Biome format check
        run: npx biome check .

      - name: Typecheck (client)
        run: npx tsc --noEmit -p tsconfig.client.json

      - name: Typecheck (server)
        run: npx tsc --noEmit -p tsconfig.server.json

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Verify harness components stripped from client bundle
        run: node scripts/ci/verify-harness-stripped.mjs

      - name: Stdio smoke test
        run: node scripts/ci/stdio-smoke.mjs
        timeout-minutes: 2

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Clear ports before E2E
        run: |
          echo "Ports in use before E2E:"
          lsof -i :3478 -i :3479 -i :5173 2>/dev/null || echo "(none)"
          fuser -k 3478/tcp 3479/tcp 5173/tcp 2>/dev/null || true
          sleep 1

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          # `test-results/` carries Playwright's trace.zip / video.webm /
          # screenshot artifacts (configured in playwright.config.ts via
          # trace/screenshot/video). Without this path, diagnosing a CI-only
          # flake requires re-running the spec locally.
          path: |
            playwright-report/
            test-results/
