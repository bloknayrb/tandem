name: Tauri Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-tauri:
    permissions:
      contents: write
      # OIDC token write for azure/login@v2 (Windows signing).
      id-token: write
    # `release` environment binds the OIDC token subject to
    # `repo:bloknayrb/tandem:environment:release`, matching the federated
    # credential on the tandem-ci-trusted-signing service principal. No
    # protection rules attached -- the environment exists solely as the
    # subject anchor.
    # CAUTION: renaming or deleting this environment silently breaks the
    # federated-credential subject match -- the Azure OIDC login fails
    # with a confusing token-validation error rather than a clear "no such
    # environment" message.
    environment:
      name: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            node-target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            node-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            node-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            node-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      # Enforce that Windows signing only runs on v* tag builds. The
      # `release` environment's UI deployment-branch rule is defense in
      # depth, but enforcement lives here so the workflow refuses to mint
      # an OIDC token off a feature branch or workflow_dispatch.
      - name: Refuse to sign outside tag builds
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          if (-not ('${{ github.ref }}'.StartsWith('refs/tags/v'))) {
            Write-Host "::error::Windows signing is restricted to v* tag builds; got ref '${{ github.ref }}'"
            exit 1
          }
          Write-Host "Tag ref OK: ${{ github.ref }}"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # libxdo-dev: required by the tauri `linux-libxdo` feature (#923) so
          # native context-menu Cut/Copy/Paste/Select All items link on Linux.
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libxdo-dev

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Download Node.js sidecar
        run: node scripts/download-node-sidecar.mjs --target ${{ matrix.node-target }}

      # Compile the process-reaper crate into src-tauri/binaries/ alongside the
      # sidecar. It's an externalBin, so `tauri_build::build()` fails without it
      # — and the auto-launcher's "Relaunch Claude" cannot spawn without it.
      - name: Build reaper
        run: node scripts/build-reaper.mjs --target ${{ matrix.node-target }}

      # Windows signing uses Azure Trusted Signing via the Microsoft-maintained
      # dotnet/sign CLI. Authentication is OIDC -> federated credential on the
      # tandem-ci-trusted-signing service principal -- no AZURE_CLIENT_SECRET
      # needed. azure/login@v2 caches the auth session in the Azure CLI; the
      # `sign` tool picks it up via DefaultAzureCredential -> AzureCliCredential.
      - name: Azure OIDC login
        if: matrix.platform == 'windows-latest'
        # SHA-pinned to the commit v2 (moving tag) resolves to at plan time.
        # Re-resolve and re-pin deliberately when bumping major versions.
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # allow-no-subscriptions is REQUIRED for Trusted Signing -- the SP
          # has no subscription role assignment, only the signer role on the
          # cert profile. Standard azure/login refuses to proceed without
          # subscriptions; do NOT remove this.
          allow-no-subscriptions: true

      - name: Install dotnet sign CLI
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Pin to a known-good prerelease. Stable `sign` 1.1.x exists but
          # uses a different subcommand surface (the `trusted-signing` ->
          # `artifact-signing` rename landed in this beta). Do NOT silently
          # bump to 1.1.x without adjusting the subcommand below.
          dotnet tool install --global sign --version 0.9.1-beta.26127.1
          # Tauri runs signCommand as a raw subprocess that does NOT reliably
          # inherit PATH updates from $env:GITHUB_PATH within the same job --
          # `sign` resolves at job time but fails when Tauri spawns it later
          # unless we pin to the absolute path.
          $signExe = Join-Path $env:USERPROFILE '.dotnet\tools\sign.exe'
          if (-not (Test-Path $signExe)) {
            throw "sign.exe not found at $signExe after dotnet tool install"
          }
          echo "SIGN_EXE_PATH=$signExe" >> $env:GITHUB_ENV

      - name: Inject bundle.windows.signCommand
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # signCommand object form `{cmd, args}` avoids shell-quoting issues
          # for the runner home path (which contains a backslash on Windows).
          # Tauri replaces '%1' in args with the absolute path of each artifact
          # being signed (inner tandem.exe before bundling; .msi and NSIS .exe
          # after bundling).
          # The Artifact Signing service (formerly Trusted Signing) handles
          # RFC 3161 timestamping internally; no --timestamp-url flag is
          # accepted on the `code artifact-signing` subcommand.
          # --azure-credential-type=azure-cli pins the auth flow to the
          # session cached by azure/login@v2 (deterministic; avoids
          # DefaultAzureCredential trying managed identity / env first).
          $signCommand = [ordered]@{
            cmd  = $env:SIGN_EXE_PATH
            args = @(
              'code', 'artifact-signing',
              '--artifact-signing-endpoint', 'https://eus.codesigning.azure.net/',
              '--artifact-signing-account', 'Tandem',
              '--artifact-signing-certificate-profile', 'tandem-prod',
              '--azure-credential-type', 'azure-cli',
              '--description', 'Tandem',
              '--description-url', 'https://github.com/bloknayrb/tandem',
              '%1'
            )
          }
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json -Depth 20
          # bundle.windows already exists (nsis.installerHooks); merge in signCommand.
          $config.bundle.windows | Add-Member -NotePropertyName signCommand -NotePropertyValue $signCommand -Force
          $config | ConvertTo-Json -Depth 20 | Set-Content src-tauri/tauri.conf.json -Encoding utf8

      - name: Validate updater signing key
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        run: |
          echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Updater artifacts will not be signed."
          exit 1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      # The .p8 App Store Connect API key is stored as base64 in
      # APPLE_API_KEY_BASE64 so it round-trips cleanly through GitHub Secrets.
      # tauri-action's notarization path wants a filesystem path
      # (APPLE_API_KEY_PATH), so decode here and export the path via $GITHUB_ENV.
      # NOTE: `secrets.*` is NOT available in step-level `if:` conditionals
      # (only in `env:` / `with:` / `run:`). Referencing it here causes a
      # workflow-file validation failure that prevents every job — including
      # tag-triggered builds — from spawning. The empty-secret check now
      # happens inside the run script, where the secret has been materialized
      # via env.
      - name: Decode App Store Connect API key
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ]; then
            echo "APPLE_API_KEY_BASE64 unset — skipping notarization key decode."
            exit 0
          fi
          umask 077
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 -d > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization (issue #428 / macOS 26.1 Tahoe Gatekeeper).
          # When these secrets are unset (current state) they expand to empty strings
          # and tauri-action skips Apple signing entirely -- same unsigned behavior as
          # before this change. When configured, tauri-action infers the signing
          # identity from APPLE_CERTIFICATE and submits the .app to Apple's notary
          # service using the App Store Connect API key (key ID + issuer + path
          # to decoded .p8). APPLE_SIGNING_IDENTITY is a repo Variable, not a
          # Secret -- the identity string is printed in every signed binary and
          # is not sensitive material.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ vars.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Apple notarization (issue #428). Re-enabled after the v0.12.0-era
          # notary-service outage that originally forced these three lines to be
          # commented out. When the notary trio is unset they expand to empty
          # strings and tauri-action skips notarization (and skips signing too
          # when APPLE_CERTIFICATE is also empty) — the same graceful no-op the
          # build had while disabled. Populate the App Store Connect API key
          # secrets (APPLE_API_ISSUER_ID, APPLE_API_KEY_ID, APPLE_API_KEY_BASE64)
          # plus APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD / APPLE_TEAM_ID
          # and the APPLE_SIGNING_IDENTITY variable to activate. The "Verify
          # macOS signature + notarization" step below then asserts the produced
          # .app is signed and has a stapled notarization ticket.
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        with:
          tagName: v__VERSION__
          releaseName: "Tandem v__VERSION__"
          releaseBody: "See the assets to download and install Tandem."
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Wipe App Store Connect API key
        if: always() && matrix.platform == 'macos-latest'
        shell: bash
        run: rm -f "$RUNNER_TEMP/private_keys/"*.p8 || true

      # The Linux twin of the macOS/Windows signature gates: install the REAL
      # built package in the REAL target distro and load every shipped binary.
      #
      # This exists because compile, package, and install are three different
      # questions from LOAD, and nothing in this pipeline ever loaded the
      # binary. #1227 shipped for nine releases behind a fully green matrix:
      # `tandem-desktop` hard-links libxdo.so.3, no package declared it, both
      # formats installed with exit 0, and the app then refused to start. An
      # undeclared runtime library is invisible to dpkg/rpm and only surfaces
      # when the dynamic loader runs.
      #
      # Deliberately NOT a static readelf check against a checked-in soname
      # list: that inspects a debug binary on a floating runner image, and its
      # failure mode ("regenerate the baseline") is indistinguishable from the
      # lazy path. This runs the shipped artifact against the real distro
      # package repos, so a wrong soname->package mapping shows up as a real
      # ldd failure rather than an assertion nobody verified.
      #
      # Runs after tauri-action so it tests the bytes that were actually
      # uploaded. The release is a DRAFT at this point, so failing here fails
      # `release-check` before anything is publishable.
      # `success()`, unlike the macOS/Windows verify steps' `always()`. Those run
      # unconditionally because tauri-action can exit 0 having produced an
      # unsigned/un-notarized bundle, so the build "succeeding" proves nothing.
      # Here, if the build failed there are simply no artifacts, and running
      # anyway just stacks a confusing second error on top of the real one.
      - name: Verify Linux packages install and load
        if: success() && matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          shopt -s nullglob
          artdir="$RUNNER_TEMP/linux-artifacts"
          mkdir -p "$artdir"
          debs=(src-tauri/target/release/bundle/deb/*.deb)
          rpms=(src-tauri/target/release/bundle/rpm/*.rpm)
          if [ ${#debs[@]} -eq 0 ] || [ ${#rpms[@]} -eq 0 ]; then
            echo "::error::Linux smoke: expected a .deb and a .rpm under src-tauri/target/release/bundle/ (found ${#debs[@]} deb, ${#rpms[@]} rpm)"
            exit 1
          fi
          cp "${debs[@]}" "${rpms[@]}" "$artdir/"

          errors=0
          run_smoke() {
            local mode="$1" image="$2"
            echo "--- $mode on $image"
            # --network host: the default bridge has no IPv6 route while the
            # distro mirrors resolve AAAA-first, which apt reports as
            # "Depends: X but it is not going to be installed" -- identical to
            # a real missing dependency. The harness also pins IPv4 itself.
            # `if`, not a bare call: GitHub runs `shell: bash` as
            # `bash --noprofile --norc -eo pipefail`, so a bare failing command
            # aborts the step before `$?` is ever read -- which would silently
            # skip the exit-3 branch below AND the second distro. The whole
            # point of this step is classifying the exit code, so it must
            # survive a non-zero one.
            local rc=0
            docker run --rm --network host \
              -v "$PWD/scripts/smoke:/smoke:ro" \
              -v "$artdir:/art:ro" \
              "$image" bash /smoke/linux-package-smoke.sh "$mode" || rc=$?
            case "$rc" in
              0) echo "::notice::Linux smoke ($mode/$image): PASS" ;;
              # The harness reports an unreachable mirror as 3 and evaluates
              # nothing. Failing a release on that would be blaming the package
              # for the network, and is how a gate earns its way to being muted.
              3) echo "::warning::Linux smoke ($mode/$image): ENVIRONMENT fault (repo metadata unreachable). The package was NOT evaluated -- re-run before trusting this build." ;;
              *) echo "::error::Linux smoke ($mode/$image): $rc packaging defect(s)"; errors=1 ;;
            esac
          }
          # ubuntu:22.04 matches this leg's own runner pin and the v1.0 exit
          # criteria -- deliberately the OLDEST supported target, since that is
          # where a dependency is most likely to be missing.
          #
          # fedora:44 is a SUPPORTED release and must be rotated as Fedora ages
          # out (N-1 is the rule of thumb). The spike originally used fedora:39,
          # which was already ~20 months EOL: EOL Fedora loses its mirror
          # metadata, so the gate would have started reporting ENVIRONMENT
          # faults forever against a distro no user runs. Verified 2026-07-22
          # that the harness runs clean on 44's dnf5 and that `libxdo` is still
          # the right package name there (same soname as on 39, which is why
          # tauri.conf.json pins no version).
          run_smoke deb ubuntu:22.04
          run_smoke rpm fedora:44
          exit "$errors"

      # Mirror of "Verify Windows signatures" for macOS: tauri-action does not
      # reliably fail the job when notarization is skipped or fails, so assert
      # the produced .app is both code-signed and carries a STAPLED notarization
      # ticket. The stapled ticket is the load-bearing fix for the Gatekeeper
      # "damaged"/"unidentified developer" first-launch error (#428) — and
      # `xcrun stapler validate` checks it fully offline, with none of the
      # network/policy flakiness `spctl --assess` exhibits on CI runners.
      #
      # When APPLE_CERTIFICATE is unset (pre-cert state) the build ships
      # unsigned BY DESIGN, so skip the gate with a ::notice:: to keep current
      # releases green; the check auto-enforces the moment signing secrets land.
      - name: Verify macOS signature + notarization
        if: always() && matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "::notice::APPLE_CERTIFICATE unset — macOS bundle ships unsigned/un-notarized by design (see #428). Skipping verification until signing secrets are populated."
            exit 0
          fi
          shopt -s nullglob
          apps=(src-tauri/target/*/release/bundle/macos/*.app src-tauri/target/release/bundle/macos/*.app)
          if [ ${#apps[@]} -eq 0 ]; then
            echo "::error::Verify macOS: no .app bundle found under src-tauri/target/**/release/bundle/macos/"
            exit 1
          fi
          errors=0
          for app in "${apps[@]}"; do
            echo "--- verifying $app"
            # --deep --strict also validates the nested node-sidecar binary.
            if ! codesign --verify --deep --strict --verbose=2 "$app"; then
              echo "::error::$app: codesign --verify failed"
              errors=1
              continue
            fi
            if ! xcrun stapler validate "$app"; then
              echo "::error::$app: notarization ticket not stapled — tauri-action notarization was skipped or failed"
              errors=1
              continue
            fi
            # #983: the original crash was the nested node-sidecar (an externalBin)
            # signed under hardened runtime WITHOUT com.apple.security.cs.allow-jit,
            # so V8 init SIGTRAPped on Apple Silicon. codesign does NOT inherit the
            # app's entitlements to nested binaries automatically, so assert the
            # sidecar itself carries the JIT entitlement — if a future toolchain
            # change stops applying bundle.macOS.entitlements to externalBins, this
            # fails loudly here instead of shipping another silent SIGTRAP.
            sidecar="$app/Contents/MacOS/node-sidecar"
            if [ ! -e "$sidecar" ]; then
              echo "::error::$app: node-sidecar not found at $sidecar"
              errors=1
              continue
            fi
            # Pipe through `strings` to handle both XML and binary plist output:
            # on newer macOS codesign may output a binary plist, which raw grep
            # can mishandle. `strings` extracts the key names from either format.
            if ! codesign -d --entitlements - "$sidecar" 2>&1 | strings | grep -q "com.apple.security.cs.allow-jit"; then
              echo "::error::$app: node-sidecar is missing com.apple.security.cs.allow-jit — it will SIGTRAP in V8 init on Apple Silicon (#983). If bundle.macOS.entitlements is not reaching the externalBin, re-sign the sidecar with the entitlements before notarization."
              errors=1
              continue
            fi
            # The reaper is the externalBin the auto-launcher spawns. It shipped
            # missing in every desktop build before this check existed; assert it
            # is bundled so "Relaunch Claude" cannot silently regress. No JIT
            # entitlement needed — the reaper is a tiny Rust binary, not V8.
            reaper="$app/Contents/MacOS/tandem-reaper"
            if [ ! -e "$reaper" ]; then
              echo "::error::$app: tandem-reaper not found at $reaper — the auto-launcher cannot spawn Claude. Check externalBin in tauri.conf.json and the Build reaper step."
              errors=1
              continue
            fi
            echo "ok: $app code-signed + notarization-stapled + sidecar allow-jit + reaper bundled"
          done
          # .dmg stapling is best-effort (tauri does not always staple the disk
          # image itself); warn but do not fail — the stapled .app inside is the
          # artifact Gatekeeper evaluates on first launch.
          for dmg in src-tauri/target/*/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/dmg/*.dmg; do
            [ -e "$dmg" ] || continue
            if xcrun stapler validate "$dmg" >/dev/null 2>&1; then
              echo "ok: $dmg stapled"
            else
              echo "::warning::$dmg: not stapled (acceptable — the embedded .app is stapled)"
            fi
          done
          if [ "$errors" -ne 0 ]; then exit 1; fi

      # Headless runtime smoke (macOS arm64). The verify step above proves the
      # bundle is signed + notarization-stapled — but a notarized app can still
      # be dead-on-arrival: #983 was the hardened-runtime sidecar SIGTRAPing in
      # V8 init on Apple Silicon (notarized, yet it never started). The stapler
      # gate can't see that; only running the binary can. This boots the ACTUAL
      # signed node-sidecar from inside the bundle exactly as the Tauri shell
      # does (`node-sidecar dist/server/index.js`, TANDEM_TAURI_SIDECAR=1) and
      # waits for /health — turning "does it actually run on macOS" into a
      # release gate instead of something only a human with a Mac could catch.
      #
      # Scoped to the aarch64 leg: macos-latest runners are Apple Silicon, so
      # the native arm64 binary execs directly — and arm64 is exactly where #983
      # lived. The x86_64 bundle would need Rosetta to run here; rather than take
      # a Rosetta-availability flake on a release-blocking gate, the x86_64 leg
      # keeps the codesign + stapler gate above and skips the runtime boot.
      #
      # We exec the sidecar binary directly rather than `open` the .app: the
      # kernel enforces the same hardened-runtime flags on any exec, so the #983
      # class still reproduces, but it's display-free and deterministic (no
      # WindowServer dependency) — the right trade for a gate that blocks ship.
      # Full GUI launch + interactive flows (VoiceOver, update install, keychain
      # round-trip) remain the manual / cloud-Mac smoke-checklist slice.
      - name: Smoke-test bundled sidecar (macOS arm64)
        if: matrix.node-target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -uo pipefail
          shopt -s nullglob
          # The if: above scopes this to the aarch64 leg, whose build outputs under
          # target/aarch64-apple-darwin/ (cargo always nests under <triple> when
          # --target is passed). Glob that exact dir and require exactly one bundle,
          # so a stale .app from another target left in the workspace can't be the
          # one we smoke.
          apps=(src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app)
          if [ ${#apps[@]} -ne 1 ]; then
            echo "::error::Smoke: expected exactly 1 arm64 .app bundle, found ${#apps[@]}: ${apps[*]:-<none>}"
            exit 1
          fi
          app="${apps[0]}"
          sidecar="$app/Contents/MacOS/node-sidecar"
          entry="$app/Contents/Resources/dist/server/index.js"
          for f in "$sidecar" "$entry"; do
            if [ ! -e "$f" ]; then
              echo "::error::Smoke: missing required bundle file: $f"
              exit 1
            fi
          done

          # Hermetic start: clear any stray listener on the WS (3478) and MCP (3479)
          # ports before spawn. On a fresh runner this is a no-op; it removes the
          # only false-pass vector (a pre-existing process answering /health) and the
          # only non-3479 bind dependency (the server binds Hocuspocus on 3478 too,
          # via Promise.all — if that bind fails, /health never comes up). BSD xargs
          # lacks GNU's -r, so clear without xargs.
          for p in 3478 3479; do
            stray="$(lsof -ti "tcp:$p" -sTCP:LISTEN 2>/dev/null || true)"
            if [ -n "$stray" ]; then
              echo "Smoke: clearing stray listener(s) on :$p — $stray"
              kill -9 $stray 2>/dev/null || true
            fi
          done

          data="$(mktemp -d)"
          # Mirror the shell's pre-spawn sample copy so the welcome.md cold-start
          # parse path (markdown -> Y.Doc) is exercised too. Best-effort: a missing
          # sample is non-fatal server-side (it logs ENOENT and still binds /health).
          cp -R "$app/Contents/Resources/sample" "$data/sample" 2>/dev/null || true

          out="$data/sidecar.out"
          err="$data/sidecar.err"
          # Match the shell's spawn (lib.rs start_sidecar): production mode +
          # isolated data dir, launcher OFF (no Claude/reaper spawn in CI). No auth
          # token needed — /health is loopback auth-exempt (server.ts). We exec the
          # binary directly, so $! is the node process itself — and thus the process
          # that binds the ports, which the ownership check below relies on.
          TANDEM_TAURI_SIDECAR=1 \
          TANDEM_DATA_DIR="$data" \
          TANDEM_DISABLE_LAUNCHER=1 \
            "$sidecar" "$entry" >"$out" 2>"$err" &
          pid=$!

          cleanup() {
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
            rm -rf "$data" || true
          }
          trap cleanup EXIT

          dump_logs() {
            echo "--- last 50 lines of sidecar stderr ---"
            tail -n 50 "$err" 2>/dev/null || true
            echo "--- last 20 lines of sidecar stdout ---"
            tail -n 20 "$out" 2>/dev/null || true
          }

          # Port 3479 = DEFAULT_MCP_PORT (shared/constants.ts); HEALTH_URL in lib.rs.
          # Wall-clock deadline (not an iteration count) so a slow curl can't shrink
          # the window. 120s budgets notarized first-exec plus the pre-bind document
          # opens (CHANGELOG/welcome.md parse) that run before the server binds.
          health="http://127.0.0.1:3479/health"
          deadline=$((SECONDS + 120))
          ok=0
          while [ "$SECONDS" -lt "$deadline" ]; do
            if ! kill -0 "$pid" 2>/dev/null; then
              echo "::error::Smoke: node-sidecar exited before /health responded — V8 init / boot crash (the #983 class)."
              dump_logs
              exit 1
            fi
            body="$(curl -fsS --max-time 5 "$health" 2>/dev/null || true)"
            if printf '%s' "$body" | grep -q '"status":"ok"'; then
              ok=1
              break
            fi
            sleep 1
          done

          if [ "$ok" -ne 1 ]; then
            echo "::error::Smoke: /health did not return status=ok within 120s — the bundled sidecar did not come up."
            dump_logs
            exit 1
          fi

          # Pin "healthy on :3479" to "OUR sidecar": confirm the listener is $pid.
          # Kills the residual false-pass where some other process answers /health.
          # A DIFFERENT pid is a hard fail; an empty result is inconclusive (don't
          # flake on an lsof quirk when health already passed and the port was
          # pre-cleared, so only our spawn could have bound it).
          listener="$(lsof -nP -iTCP:3479 -sTCP:LISTEN -t 2>/dev/null || true)"
          if [ -n "$listener" ] && ! printf '%s\n' "$listener" | grep -qx "$pid"; then
            echo "::error::Smoke: /health is served by pid(s) [$listener], not our sidecar (pid $pid) — stale-listener false-pass averted."
            dump_logs
            exit 1
          fi
          echo "ok: our sidecar (pid $pid) booted + /health returned status=ok; listener on :3479 = [${listener:-unconfirmed}]"

      # tauri-action (observed 2026-05, no upstream issue found) does not
      # always surface signCommand non-zero exits as job failure. Verify
      # every produced bundle is signed and timestamped; fail the job
      # loudly if anything is unsigned or stale. To safely remove this step:
      # force-fail signCommand (e.g. break the cert profile name) and confirm
      # the tauri-action build step fails with non-zero exit before deletion.
      #
      # We deliberately verify ONLY the user-facing bundles (.msi + NSIS .exe),
      # NOT `target/release/tandem-desktop.exe`. tauri-bundler patches +
      # signs the cargo binary IN PLACE for each bundle type (it must, so
      # the binary embedded inside the .msi/.exe carries a signature), then
      # at end-of-bundle restores the pre-patch unsigned snapshot. See
      # `tauri-bundler/src/bundle.rs` (`main_binary_copy` / `main_binary_orignal`
      # restore loop). The standalone `tandem-desktop.exe` on disk after the
      # build is intentionally unsigned — what the user installs and runs
      # comes from the bundle's embedded copy.
      - name: Verify Windows signatures
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Two user-facing artifacts per Windows build:
          #   1. src-tauri/target/release/bundle/nsis/Tandem_*-setup.exe
          #   2. src-tauri/target/release/bundle/msi/Tandem_*_x64_en-US.msi
          # Each contains an embedded signed `tandem-desktop.exe` extracted
          # at install time. The standalone exe at target/release is a
          # leftover unsigned build artifact and is NOT verified here.
          $bundleFiles = @()
          $bundleFiles += Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis' -Filter '*.exe' -ErrorAction SilentlyContinue
          $bundleFiles += Get-ChildItem -Path 'src-tauri/target/release/bundle/msi'  -Filter '*.msi' -ErrorAction SilentlyContinue
          if ($bundleFiles.Count -eq 0) {
            Write-Host '::error::Verify Windows signatures: no .exe/.msi artifacts found under src-tauri/target/release/'
            exit 1
          }
          $errors = @()
          foreach ($f in $bundleFiles) {
            $sig = Get-AuthenticodeSignature -FilePath $f.FullName
            if ($sig.Status -ne 'Valid') {
              $errors += "$($f.FullName): Status=$($sig.Status) StatusMessage=$($sig.StatusMessage)"
            } elseif (-not $sig.TimeStamperCertificate) {
              $errors += "$($f.FullName): signature missing RFC 3161 timestamp"
            } else {
              # TODO(#428): after first signed rc, harden this by asserting
              # the cert subject matches the expected Trusted Signing DN.
              # With Individual validation, the CN reflects the validated
              # legal name (e.g. CN=Bryan Kolb), NOT the Trusted Signing
              # account name 'Tandem'. Capture the actual subject from the
              # first green build log below and pin it via -match here.
              $tsSubject = if ($sig.TimeStamperCertificate) { $sig.TimeStamperCertificate.Subject } else { '(none)' }
              Write-Host "ok: $($f.Name) signed by '$($sig.SignerCertificate.Subject)'; timestamped by '$tsSubject'"
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "::error::$_" }
            exit 1
          }

  release-check:
    permissions: {}
    needs: build-tauri
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds succeeded
        if: needs.build-tauri.result != 'success'
        run: |
          echo "::error::Some platform builds failed. Check the matrix jobs before publishing the release."
          exit 1
