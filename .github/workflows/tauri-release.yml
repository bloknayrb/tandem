name: Tauri Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            node-target: aarch64-apple-darwin
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            node-target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
            node-target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ""
            node-target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install npm dependencies
        run: npm ci

      - name: Download Node.js sidecar
        run: node scripts/download-node-sidecar.mjs --target ${{ matrix.node-target }}

      - name: Create self-signed code signing certificate
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Tandem Editor, O=Tandem" `
            -CertStoreLocation Cert:\CurrentUser\My `
            -NotAfter (Get-Date).AddYears(5)
          if (-not $cert) { throw "Failed to create code signing certificate" }
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV

      - name: Configure Windows code signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json -Depth 20
          $config.bundle | Add-Member -NotePropertyName windows -NotePropertyValue @{
            certificateThumbprint = $env:CERT_THUMBPRINT
            digestAlgorithm = "sha256"
            timestampUrl = "http://timestamp.digicert.com"
          } -Force
          $config | ConvertTo-Json -Depth 20 | Set-Content src-tauri/tauri.conf.json

      - name: Validate updater signing key
        if: env.TAURI_SIGNING_PRIVATE_KEY == ''
        run: |
          echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set. Updater artifacts will not be signed."
          exit 1
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "Tandem v__VERSION__"
          releaseBody: "See the assets to download and install Tandem."
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  release-check:
    permissions: {}
    needs: build-tauri
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all builds succeeded
        if: needs.build-tauri.result != 'success'
        run: |
          echo "::error::Some platform builds failed. Check the matrix jobs before publishing the release."
          exit 1
